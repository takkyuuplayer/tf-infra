version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/" # https://docs.github.com/en/code-security/reference/supply-chain-security/dependabot-options-reference#directories-or-directory--
    schedule:
      interval: "cron"
      cronjob: "0 0 1 * *"
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: "terraform"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 0 1 * *"
    groups:
      terraform:
        patterns:
          - "*"
